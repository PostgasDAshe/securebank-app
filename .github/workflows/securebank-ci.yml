name: SecureBank CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          pip install flask werkzeug bandit flake8

      - name: Lint
        run: |
          flake8 app_corregida.py --max-line-length=120

      - name: SAST con Bandit
        run: |
          bandit -r app_corregida.py -ll

      - name: Construir imagen Docker
        run: |
          docker build -t securebank-app:${{ github.sha }} .

      - name: Analizar imagen con Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: securebank-app:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 1